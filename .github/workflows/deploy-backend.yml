name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: # manual trigger

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.13.1"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Run linting (optional)
        working-directory: ./server
        run: npm run lint || echo "No lint script found, skipping..."
        continue-on-error: true

      - name: Create deployment package
        working-directory: ./server
        run: |
          mkdir -p deploy

          # Copy source files
          cp -r src deploy/
          cp -r public deploy/ 2>/dev/null || echo "No public folder"

          # Copy configuration files
          cp package*.json deploy/
          cp ecosystem.config.cjs deploy/

          # Copy environment example if exists
          [ -f .env.example ] && cp .env.example deploy/ || echo "No .env.example found"
          [ -f .env.production ] && cp .env.production deploy/.env.example || echo "No .env.production found"

          # Create tarball
          tar -czf deploy.tar.gz -C deploy .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-deployment-package
          path: server/deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-deployment-package

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          APP_DIR: ${{ secrets.APP_DIR || '/var/www/genmeta-backend' }}
        run: |
          # Create SSH key file
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          # Copy deployment package to EC2
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz ${EC2_USERNAME}@${EC2_HOST}:/tmp/

          # SSH into EC2 and deploy
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'

          # Set app directory
          APP_DIR="${APP_DIR:-/var/www/genmeta-backend}"

          # Create app directory if it doesn't exist
          if [ ! -d "$APP_DIR" ]; then
            echo "Creating application directory: $APP_DIR"
            sudo mkdir -p $APP_DIR
            sudo chown -R $USER:$USER $APP_DIR
          fi

          # Navigate to app directory
          cd $APP_DIR

          # Fix ownership (important!)
          echo "Fixing directory ownership..."
          sudo chown -R $USER:$USER $APP_DIR

          # Backup current version
          if [ -d "src" ]; then
            timestamp=$(date +%Y%m%d_%H%M%S)
            mkdir -p backups
            echo "Creating backup: backup_${timestamp}.tar.gz"
            tar -czf backups/backup_${timestamp}.tar.gz src package.json ecosystem.config.cjs .env 2>/dev/null || true
            
            # Keep only last 5 backups
            ls -t backups/backup_*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm
            echo "Backup created successfully"
          fi

          # Extract new version (this will overwrite existing files)
          echo "Extracting new deployment package..."
          tar --overwrite -xzf /tmp/deploy.tar.gz -C $APP_DIR
          rm /tmp/deploy.tar.gz

          # Fix ownership after extraction
          sudo chown -R $USER:$USER $APP_DIR

          # Install production dependencies
          echo ""
          echo "Installing production dependencies..."
          npm ci --omit=dev

          # Preserve existing .env or create from example
          if [ ! -f .env ]; then
            if [ -f .env.example ]; then
              echo "Creating .env from .env.example..."
              cp .env.example .env
              echo "⚠️  WARNING: Please update .env with production values!"
            else
              echo "Creating minimal .env file..."
              echo "NODE_ENV=production" > .env
              echo "PORT=8000" >> .env
              echo "⚠️  WARNING: Please configure .env with all required values!"
            fi
          else
            echo "Using existing .env file"
          fi

          # Create logs directory
          mkdir -p logs

          # Zero-downtime reload with PM2
          if pm2 describe genmeta-backend > /dev/null 2>&1; then
            echo ""
            echo "Reloading PM2 app (zero-downtime)..."
            pm2 reload ecosystem.config.cjs --update-env
          else
            echo ""
            echo "Starting new PM2 process..."
            pm2 start ecosystem.config.cjs
          fi

          # Save PM2 process list
          pm2 save

          # Show PM2 status
          echo ""
          echo "PM2 Status:"
          pm2 list

          echo ""
          echo "✅ Deployment completed successfully!"
          EOF

          # Cleanup
          rm private_key.pem

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "Waiting for application to start..."
          sleep 15

          # Create SSH key
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          # Check PM2 status on server
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'

          echo "Checking PM2 process status..."
          if pm2 describe genmeta-backend > /dev/null 2>&1; then
            pm2 describe genmeta-backend | grep -E "status|uptime|restarts"
            
            # Check if process is online
            status=$(pm2 jlist | jq -r '.[] | select(.name=="genmeta-backend") | .pm2_env.status')
            if [ "$status" = "online" ]; then
              echo "✅ PM2 process is online and running!"
            else
              echo "❌ PM2 process status: $status"
              echo "Recent logs:"
              pm2 logs genmeta-backend --lines 20 --nostream
              exit 1
            fi
          else
            echo "❌ PM2 process 'genmeta-backend' not found!"
            pm2 list
            exit 1
          fi
          EOF

          # Cleanup
          rm private_key.pem

          # Try to check via nginx (if configured)
          echo ""
          echo "Checking application via HTTP..."
          for i in {1..3}; do
            echo "Attempt $i of 3..."
            response=$(curl -s -o /dev/null -w "%{http_code}" http://${EC2_HOST} 2>/dev/null || echo "000")
            
            if [ "$response" = "200" ] || [ "$response" = "301" ] || [ "$response" = "302" ]; then
              echo "✅ Application is responding via HTTP with status: $response"
              exit 0
            fi
            
            echo "Got response: $response, waiting 5 seconds..."
            sleep 5
          done

          echo "⚠️  HTTP check inconclusive (status: $response)"
          echo "PM2 process is running, but HTTP endpoint may not be configured yet"
          echo "Please verify nginx configuration if needed"

      - name: Rollback on failure
        if: failure()
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          APP_DIR: ${{ secrets.APP_DIR || '/var/www/genmeta-backend' }}
        run: |
          echo "🔄 Attempting to rollback to previous version..."
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'

          APP_DIR="${APP_DIR:-/var/www/genmeta-backend}"
          cd $APP_DIR

          # Fix ownership first
          sudo chown -R $USER:$USER $APP_DIR

          # Find latest backup
          latest_backup=$(ls -t backups/backup_*.tar.gz 2>/dev/null | head -1)

          if [ -n "$latest_backup" ]; then
            echo "Found backup: $latest_backup"
            tar -xzf "$latest_backup" -C $APP_DIR
            npm ci --omit=dev
            pm2 reload ecosystem.config.cjs
            echo "✅ Rolled back to previous version"
          else
            echo "⚠️  No backup found, cannot rollback"
            echo "Attempting to restart current version..."
            pm2 restart genmeta-backend
          fi

          pm2 list
          EOF

          rm private_key.pem
